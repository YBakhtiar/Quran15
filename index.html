<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>القرآن الكريم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vazirmatn/33.0.0/Vazirmatn-font-face.min.css">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet" type="text/css">
    <style>
        body {
            background-color: #0d1622;
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            overscroll-behavior-y: contain;
            /* جلوگیری از رفتارهای پیش‌فرض لمسی مرورگر روی کل صفحه */
            touch-action: none; 
        }
        
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 20px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px;
            opacity: 0.8;
            transition: all 0.4s ease;
            z-index: 1002;
        }
        
        .menu-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .main-download-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #8da4be;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 13px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 12px;
            opacity: 0.7;
            transition: all 0.4s ease;
            z-index: 1002;
        }
        
        .main-download-btn:hover {
            opacity: 1;
            color: #cfddec;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .main-download-btn.done {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
            pointer-events: none;
            display: none;
        }

        .progress-tooltip {
            position: fixed;
            top: 65px;
            left: 20px;
            color: #8da4be;
            font-size: 11px;
            background: rgba(13, 22, 34, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 6px;
            display: none;
            z-index: 1002;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -220px;
            width: 190px;
            background: rgba(17, 29, 43, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            box-sizing: border-box;
            padding: 85px 0 20px 0;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-title {
            color: #8da4be;
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        #juzList {
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
            padding-bottom: 10px;
        }
        
        #juzList::-webkit-scrollbar {
            width: 4px;
        }
        
        #juzList::-webkit-scrollbar-track {
            background: transparent;
        }
        
        #juzList::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        
        .sidebar button.juz-btn {
            display: block;
            width: 82%;
            margin: 6px auto;
            padding: 9px;
            background: rgba(255, 255, 255, 0.05);
            color: #8da4be;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .sidebar button.juz-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.02);
        }

        .sidebar button.delete-btn {
            color: #c96a75;
            border: 1px dashed rgba(201, 106, 117, 0.3);
            background: transparent;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        
        .sidebar button.delete-btn:hover {
            background: rgba(201, 106, 117, 0.1);
            border-color: rgba(201, 106, 117, 0.5);
            color: #e57e8a;
            transform: scale(1.02);
        }

        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            background-color: transparent;
            overflow: hidden; /* تغییر مهم برای جلوگیری از اسکرول اضافه */
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
            touch-action: none; /* کنترل لمس فقط توسط جاوااسکریپت */
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
            /* تنظیمات پایه برای زوم اختصاصی عکس */
            transform-origin: center center;
            will-change: transform;
        }
        
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(13, 22, 34, 0.05);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            color: #8da4be;
            padding: 0 8px;
            cursor: pointer;
            z-index: 100;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            opacity: 0.7;
            transition: all 0.4s ease;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            opacity: 1;
        }
        
        .right-btn {
            right: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .left-btn {
            left: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0.7;
            z-index: 1000;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 0;
            padding: 0;
        }
        
        .fullscreen-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        @media screen and (max-width: 768px) {
            .quran-container {
                padding: 10px;
                gap: 0;
            }
            .page {
                max-width: 100%;
                width: 100%;
                height: auto;
                max-height: 95vh;
            }
            .nav-btn {
                display: none !important;
            }
            .fullscreen-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <button id="mainDownloadBtn" class="main-download-btn" onclick="startDownload()">📥 دانلود آفلاین</button>
    <div id="progressTooltip" class="progress-tooltip">در حال دانلود...</div>
    
    <button class="menu-toggle" onclick="toggleSidebar()" title="منو">&#9776;</button>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        <div id="juzList"></div>
    </div>
    
    <div class="main-content" id="swipeArea">
        <button class="nav-btn right-btn" onclick="prevPage()" title="صفحه قبل">&#10094;</button>
        
        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست">
            <img id="leftPage" class="page" alt="صفحه چپ">
        </div>
        
        <button class="nav-btn left-btn" onclick="nextPage()" title="صفحه بعد">&#10095;</button>
        
        <button class="fullscreen-btn" onclick="toggleFullScreen()" title="تمام صفحه">⤢</button>
    </div>

    <script>
        const totalPages = 623;
        let currentPage = 1;
        let isDownloaded = false;

        // متغیرهای سیستم زوم اختصاصی عکس
        let currentScale = 1;
        let translateX = 0; let translateY = 0;
        let lastTranslateX = 0; let lastTranslateY = 0;
        let initialPinchDistance = null;
        let isPanning = false;
        let lastTapTime = 0;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker ثبت شد:', reg))
                    .catch(err => console.log('خطا در ثبت Service Worker:', err));
            });
        }

        function setDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            const progress = document.getElementById('progressTooltip');
            const delBtn = document.getElementById('deleteBtnSidebar');
            
            if (dlBtn) {
                dlBtn.style.display = "none";
                dlBtn.classList.add('done');
            }
            if (progress) progress.style.display = "none";
            if (delBtn) delBtn.style.display = "block";
            isDownloaded = true;
        }

        function resetDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            const delBtn = document.getElementById('deleteBtnSidebar');
            
            if (dlBtn) {
                dlBtn.style.display = "block";
                dlBtn.innerHTML = "📥 دانلود آفلاین";
                dlBtn.style.pointerEvents = "auto";
                dlBtn.classList.remove('done');
            }
            if (delBtn) delBtn.style.display = "none";
            isDownloaded = false;
        }

        async function startDownload() {
            if (!confirm("آیا مطمئن هستید؟ حدود ۷۰ مگابایت حجم دارد.")) return;
            
            const dlBtn = document.getElementById('mainDownloadBtn');
            const progress = document.getElementById('progressTooltip');
            
            dlBtn.style.pointerEvents = "none";
            dlBtn.innerHTML = "⏳ در حال دانلود...";
            progress.style.display = "block";
            progress.style.color = "#8da4be";
            progress.innerText = "در حال دانلود...";

            try {
                const cache = await caches.open('quran-cache-v1');
                let downloadedCount = 0;
                const batchSize = 10;
                
                for (let i = 1; i <= totalPages; i += batchSize) {
                    const promises = [];
                    for (let j = 0; j < batchSize && (i + j) <= totalPages; j++) {
                        let pageNum = String(i + j).padStart(3, '0');
                        let imgUrl = 'images/Quran' + pageNum + '.jpg';
                        
                        promises.push(
                            fetch(imgUrl, { cache: 'reload' })
                                .then(async (response) => {
                                    if (response.ok) {
                                        await cache.put(imgUrl, response.clone());
                                        return true;
                                    }
                                    return false;
                                })
                                .catch(e => false)
                        );
                    }
                    await Promise.all(promises);
                    downloadedCount += batchSize;
                    progress.innerText = 'پیشرفت: ' + Math.min(downloadedCount, totalPages) + ' از ' + totalPages;
                }
                
                setDownloadedUI();
                alert("دانلود با موفقیت انجام شد! اکنون آفلاین هستید.");
                
            } catch (error) {
                console.error("Download Error:", error);
                progress.innerText = "❌ خطا در دانلود";
                progress.style.color = "#c96a75";
                dlBtn.style.pointerEvents = "auto";
                dlBtn.innerHTML = "🔄 تلاش مجدد";
            }
        }

        async function deleteOfflineFiles() {
            if (!confirm("فایل‌های آفلاین حذف شوند؟ حدود ۷۰ مگابایت آزاد می‌شود.")) return;
            try {
                const progress = document.getElementById('progressTooltip');
                progress.style.display = "block";
                progress.innerText = "در حال حذف...";
                progress.style.color = "#8da4be";
                
                await caches.delete('quran-cache-v1');
                resetDownloadedUI();
                progress.style.display = "none";
                alert("فایل‌های آفلاین با موفقیت حذف شدند.");
            } catch(e) {
                alert("خطا در حذف فایل‌ها");
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toPersianNum(num) {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        // دکمه‌های اجزاء
        const juzListDiv = document.getElementById("juzList");
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 1) startPage = 3;
            else if (i === 30) startPage = 588;
            else startPage = 4 + ((i - 1) * 20);

            let btn = document.createElement("button");
            btn.className = "juz-btn";
            btn.innerText = "جزء " + toPersianNum(i);
            btn.onclick = function() {
                let targetPage = startPage;
                if (window.innerWidth > 768 && targetPage % 2 === 0) targetPage -= 1;
                currentPage = targetPage;
                updatePages();
                document.getElementById('sidebar').classList.remove('open');
            };
            juzListDiv.appendChild(btn);
        }
        
        const delBtn = document.createElement("button");
        delBtn.id = "deleteBtnSidebar";
        delBtn.className = "juz-btn delete-btn";
        delBtn.innerText = "🗑 حذف فایل‌های آفلاین";
        delBtn.style.display = "none";
        delBtn.onclick = deleteOfflineFiles;
        juzListDiv.appendChild(delBtn);

        function formatPageNumber(num) {
            return String(num).padStart(3, '0');
        }

        // تابع اعمال زوم روی عکس
        function applyTransform(withTransition = false) {
            const rightImg = document.getElementById("rightPage");
            const leftImg = document.getElementById("leftPage");
            const transformStyle = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
            
            [rightImg, leftImg].forEach(img => {
                if(img) {
                    img.style.transition = withTransition ? 'transform 0.3s ease-out' : 'none';
                    img.style.transform = transformStyle;
                }
            });
        }

        // تابع بازنشانی زوم
        function resetZoom() {
            currentScale = 1;
            translateX = 0; translateY = 0;
            lastTranslateX = 0; lastTranslateY = 0;
            applyTransform(true);
        }

        function updatePages() {
            resetZoom(); // در زمان ورق زدن، عکس به حالت اول برگردد
            
            let isMobile = window.innerWidth <= 768;
            const rightImg = document.getElementById("rightPage");
            const leftImg = document.getElementById("leftPage");

            if (isMobile) {
                rightImg.src = 'images/Quran' + formatPageNumber(currentPage) + '.jpg';
                leftImg.style.display = "none";
            } else {
                let rightPageNum = (currentPage % 2 !== 0) ? currentPage : currentPage - 1;
                let leftPageNum = rightPageNum + 1;

                rightImg.src = 'images/Quran' + formatPageNumber(rightPageNum) + '.jpg';
                if (leftPageNum <= totalPages) {
                    leftImg.src = 'images/Quran' + formatPageNumber(leftPageNum) + '.jpg';
                    leftImg.style.display = "block";
                } else {
                    leftImg.style.display = "none";
                }
                if (currentPage % 2 === 0) currentPage = rightPageNum;
            }
            
            try { localStorage.setItem('lastQuranPage', currentPage.toString()); } catch(e) {}
            try { if (window.location.protocol !== 'file:') history.replaceState(null, null, '#' + currentPage); } catch(e) {}
        }

        function nextPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage + step <= totalPages) currentPage += step;
            else if (currentPage < totalPages) currentPage++;
            updatePages();
        }

        function prevPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage - step >= 1) currentPage -= step;
            else if (currentPage > 1) currentPage--;
            updatePages();
        }

        // سیستم پیشرفته لمس، سوایپ و زوم
        let touchstartX = 0; let touchstartY = 0;
        let touchendX = 0; let touchendY = 0;
        let touchStartTime = 0;

        const swipeArea = document.getElementById('swipeArea');
        
        swipeArea.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                // شروع زوم با دو انگشت
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else if (e.touches.length === 1) {
                touchstartX = e.touches[0].clientX;
                touchstartY = e.touches[0].clientY;
                touchStartTime = new Date().getTime();
                
                // اگر قبلا زوم شده، آماده جابجایی (Pan) می‌شویم
                if (currentScale > 1) {
                    isPanning = true;
                }
            }
        }, {passive: false});

        swipeArea.addEventListener('touchmove', e => {
            // جلوگیری از رفتارهای پیش‌فرض موبایل
            e.preventDefault(); 
            
            if (e.touches.length === 2 && initialPinchDistance) {
                // محاسبه زوم در حین کشیدن دو انگشت
                let currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                let scaleChange = currentDistance / initialPinchDistance;
                currentScale = Math.min(Math.max(1, currentScale * scaleChange), 4); // حداکثر زوم ۴ برابر
                initialPinchDistance = currentDistance;
                applyTransform(false);
            } else if (e.touches.length === 1 && isPanning && currentScale > 1) {
                // جابجایی عکس وقتی زوم است
                let deltaX = e.touches[0].clientX - touchstartX;
                let deltaY = e.touches[0].clientY - touchstartY;
                translateX = lastTranslateX + deltaX;
                translateY = lastTranslateY + deltaY;
                applyTransform(false);
            }
        }, {passive: false});

        swipeArea.addEventListener('touchend', e => {
            // بررسی دوبار ضربه (Double Tap) برای ریست کردن زوم
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTapTime;
            if (tapLength < 300 && tapLength > 0 && e.changedTouches.length === 1) {
                resetZoom();
                lastTapTime = 0;
                return;
            }
            lastTapTime = currentTime;

            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
            
            if (isPanning) {
                lastTranslateX = translateX;
                lastTranslateY = translateY;
                isPanning = false;
                return; // بعد از جابجایی عکس، ورق نخورد
            }

            // تشخیص ورق زدن (سوایپ) فقط در حالتی که صفحه زوم نیست
            if (currentScale <= 1.05 && e.changedTouches.length === 1) {
                touchendX = e.changedTouches[0].clientX;
                touchendY = e.changedTouches[0].clientY;
                
                let diffX = Math.abs(touchendX - touchstartX);
                let diffY = Math.abs(touchendY - touchstartY);
                let timeDiff = new Date().getTime() - touchStartTime;
                
                if (diffX > 80 && diffX > diffY * 2 && timeDiff < 600) {
                    if (touchendX > touchstartX) nextPage(); // سوایپ به راست
                    else prevPage(); // سوایپ به چپ
                }
            }
        }, {passive: false});

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowRight') { e.preventDefault(); prevPage(); }
        });

        window.addEventListener('resize', updatePages);

        document.addEventListener('DOMContentLoaded', function() {
            let hashPage = parseInt(window.location.hash.replace('#', ''));
            let savedPage = null;
            try { savedPage = localStorage.getItem('lastQuranPage'); } catch(e) {}

            if (hashPage && hashPage >= 1 && hashPage <= totalPages) {
                currentPage = hashPage;
            } else if (savedPage && !isNaN(parseInt(savedPage))) {
                currentPage = parseInt(savedPage);
            }
            
            updatePages();
            
            caches.open('quran-cache-v1').then(cache => {
                cache.match('images/Quran001.jpg').then(res => {
                    if (res) setDownloadedUI();
                });
            });
        });
    </script>
</body>
</html>
